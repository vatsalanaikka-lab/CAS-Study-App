<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>CAS Study App</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0f172a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="CAS Study"/>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{background:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script type="text/babel">
const {useState} = React;

const E5_EXAM  = new Date("2026-10-27");
const MAS_EXAM = new Date("2026-11-05");

const DAY_EXCEPTIONS = { "2026-06-21": "mas" };

function examForDay(dow) {
  if (dow===1||dow===3||dow===5||dow===6) return "mas";
  if (dow===2||dow===4||dow===0) return "e5";
  return null;
}
function examForDate(date) {
  const k = localKey(date);
  if (DAY_EXCEPTIONS[k]) return DAY_EXCEPTIONS[k];
  return examForDay(date.getDay());
}

const E5_SECTIONS = [
  ["CA 3.1 - Traditional Risk Classification",2],
  ["CA 3.2 - Multivariate Classification (weak area)",3],
  ["CA 3.3 - Special Classification (weak area)",2],
  ["CA 3.4 - Credibility",1],
  ["CA 4.1 - Constraints and Considerations",1],
  ["CA 4.2 - Finalizing Rates",1],
  ["CA 5.1 - Claims-Made Policies",1],
  ["CA 5.2 - Commercial Lines Rating Mechanisms",1],
  ["CA 2.1 - Addressing Anomalies in Loss Data",1],
  ["CA 2.2 - Rate and Benefit Changes",2],
  ["CA 2.3 - Development",1],
  ["CA 2.4 - Trending",1],
  ["CA 2.5 - Expenses and Profit",2],
  ["CA 2.6 - Overall Rate Level Indications",1],
  ["CA 1.3 - Understanding Insurance Data (A1)",1],
  ["ADAPT: Reserving 6.1-6.2 - learn via practice Q's (Chain Ladder)",2],
  ["ADAPT: Reserving 6.3-6.5 - learn via practice Q's (Exp Claims, BF, Cape Cod)",2],
  ["ADAPT: Reserving 6.6-6.7 - learn via practice Q's (Freq-Sev, Case O/S)",2],
  ["ADAPT: Reserving 7.1-7.2 - learn via practice Q's (Berquist-Sherman, Eval)",2],
  ["ADAPT: Reserving 8.1-8.3 - learn via practice Q's (Recoveries, ALAE, ULAE)",2],
  ["ADAPT: Ratemaking custom quizzes (A8/A6/A7 focus)",3],
  ["ADAPT: Reserving mixed custom quizzes",2],
  ["ADAPT: Full E5 mock exam #1 + review",3],
  ["ADAPT: Weak spot targeting from mock #1",2],
  ["ADAPT: Ratemaking past papers + self-mark",3],
  ["ADAPT: Reserving past papers + self-mark",3],
  ["ADAPT: Full E5 mock exam #2 + review",3],
  ["ADAPT: Target remaining weak spots",2],
  ["ADAPT: Full E5 mock exam #3 + review",3],
  ["ADAPT: Mixed past papers + formula drill",3],
  ["ADAPT: Full mock under exam conditions",2],
  ["ADAPT: Written justification practice",2],
  ["ADAPT: Final formula cram - Ratemaking + Reserving",2],
  ["Light review only - rest well, sleep early",2],
  ["Exam 5 - Oct 27, you've got this!",1],
];

const MAS_SECTIONS = [
  ["CA 1.0 - Basics",0],
  ["CA 1.1 - Claim Severity Distributions",0],
  ["CA 1.2 - Insurance Applications",0],
  ["CA 1.3 - Tail Properties of Distributions",1],
  ["CA 1.4 - Poisson Processes",3],
  ["CA 1.5 - Reliability Theory",2],
  ["CA 1.6 - Discrete Markov Chains",2],
  ["CA 1.7 - Life Contingencies",2],
  ["CA 1.8 - Simulation",1],
  ["CA 2.1 - Parameter and Density Estimation",2],
  ["CA 2.2 - Estimator Quality",3],
  ["CA 2.3 - Hypothesis Testing",3],
  ["CA 2.4 - Most Powerful Tests",1],
  ["CA 2.5 - Goodness of Fit Tests",2],
  ["CA 2.6 - Confidence Intervals",2],
  ["CA 2.7 - Order Statistics",1],
  ["CA 3.1 - Introduction to Statistical Learning",1],
  ["CA 3.2 - Simple Linear Regression",3],
  ["CA 3.3 - Multiple Linear Regression",2],
  ["CA 3.4 - ANOVA",2],
  ["CA 3.5 - Linear Model Assumptions",2],
  ["CA 3.6 - Model Selection",1],
  ["CA 3.7 - Other Linear Regression Approaches",2],
  ["CA 3.8 - Generalized Linear Models",3],
  ["CA 3.9 - Binomial & Categorical Response Regression",1],
  ["CA 3.10 - Poisson Response Regression",1],
  ["CA 3.11 - Generalized Additive Models",1],
  ["ADAPT: Section 1 (PM) custom quiz + review",2],
  ["ADAPT: Section 2 (Stats) custom quiz + review",2],
  ["ADAPT: Section 3 (LM) custom quiz + review",2],
  ["ADAPT: MAS-I mixed practice - all sections",2],
  ["ADAPT: MAS-I mock exam #1 + review",3],
  ["ADAPT: Weak spot targeting",2],
  ["ADAPT: MAS-I mock exam #2 + review",3],
  ["ADAPT: Past papers - mixed",2],
  ["ADAPT: Formula cram + final mock",3],
  ["Light review only - rest well",2],
  ["MAS-I - Nov 5, you've got this!",1],
];

const MAS_START = new Date("2026-06-21");
const E5_START  = (function(){ const t=new Date(); t.setHours(0,0,0,0); return t; })();

function localKey(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function shiftKey(date, days) {
  return localKey(new Date(date.getTime() + days*86400000));
}
function getDaysUntil(d) {
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.max(0, Math.ceil((d-t)/86400000));
}
function offsetLabel(n) {
  if (n===0) return "On track";
  return Math.abs(n)+" session"+(Math.abs(n)>1?"s":"")+" "+(n<0?"behind":"ahead");
}
function buildExamPlan(sections, examKey, startDate) {
  const map = {};
  let secIdx = 0, sessUsed = 0;
  while (secIdx < sections.length && sections[secIdx][1] === 0) secIdx++;
  const d = new Date(startDate);
  for (let i = 0; i < 250 && secIdx < sections.length; i++) {
    const day = new Date(d.getTime() + i*86400000);
    if (examForDate(day) === examKey) {
      map[localKey(day)] = { label: sections[secIdx][0], idx: secIdx };
      if (++sessUsed >= sections[secIdx][1]) {
        secIdx++; sessUsed = 0;
        while (secIdx < sections.length && sections[secIdx][1] === 0) secIdx++;
      }
    }
  }
  return map;
}

const E5_PLAN  = buildExamPlan(E5_SECTIONS, "e5", E5_START);
const MAS_PLAN = buildExamPlan(MAS_SECTIONS, "mas", MAS_START);

const MN = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DN = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function loadDone() {
  try { const s=localStorage.getItem("cas_v4"); return s?JSON.parse(s):{e5:[],mas:[0,1,2]}; }
  catch(e) { return {e5:[],mas:[0,1,2]}; }
}
function saveDone(o) { try{localStorage.setItem("cas_v4",JSON.stringify(o));}catch(e){} }
function loadOffsets() {
  try { const s=localStorage.getItem("cas_off4"); return s?JSON.parse(s):{e5:0,mas:0}; }
  catch(e) { return {e5:0,mas:0}; }
}
function saveOffsets(o) { try{localStorage.setItem("cas_off4",JSON.stringify(o));}catch(e){} }

function App() {
  const [tab, setTab]           = useState("home");
  const [doneObj, setDoneObj]   = useState(loadDone);
  const [offsets, setOffsets]   = useState(loadOffsets);
  const [planExam, setPlanExam] = useState("mas");

  const done = { e5:new Set(doneObj.e5), mas:new Set(doneObj.mas) };

  const today = new Date();
  const tom   = new Date(today.getTime()+86400000);
  const e5Left  = getDaysUntil(E5_EXAM);
  const masLeft = getDaysUntil(MAS_EXAM);

  const todayDow  = today.getDay();
  const todayExam = examForDate(today);
  const tomExam   = examForDate(tom);

  const todayTask = todayExam==="e5"  ? E5_PLAN[shiftKey(today, offsets.e5)]
                  : todayExam==="mas" ? MAS_PLAN[shiftKey(today, offsets.mas)]
                  : null;
  const tomTask   = tomExam==="e5"  ? E5_PLAN[shiftKey(tom, offsets.e5)]
                  : tomExam==="mas" ? MAS_PLAN[shiftKey(tom, offsets.mas)]
                  : null;

  const isWE = todayDow===0||todayDow===6;
  const todayLabel = DN[todayDow]+", "+MN[today.getMonth()]+" "+today.getDate();
  const tomLabel   = DN[tom.getDay()]+" "+MN[tom.getMonth()]+" "+tom.getDate();

  const e5Pct  = Math.round(done.e5.size  / E5_SECTIONS.length  * 100);
  const masPct = Math.round(done.mas.size / MAS_SECTIONS.length * 100);

  function toggleSection(exam, idx) {
    const arr = new Set(doneObj[exam]);
    arr.has(idx) ? arr.delete(idx) : arr.add(idx);
    const n = Object.assign({}, doneObj); n[exam]=[...arr];
    setDoneObj(n); saveDone(n);
  }
  function adjust(exam, delta) {
    const n = Object.assign({}, offsets); n[exam]=offsets[exam]+delta;
    setOffsets(n); saveOffsets(n);
  }

  const adjBtn = {width:30,height:30,borderRadius:8,border:"1px solid #e2e8f0",background:"#f8fafc",cursor:"pointer",fontSize:15,fontWeight:700,color:"#374151"};
  const EX = {e5:{name:"Exam 5",color:"#ef4444",bg:"#fef2f2",border:"#fecaca",emoji:"E5"},
              mas:{name:"MAS-I",color:"#3b82f6",bg:"#eff6ff",border:"#bfdbfe",emoji:"MAS"}};

  const planSections = planExam==="e5" ? E5_SECTIONS : MAS_SECTIONS;
  const planMap      = planExam==="e5" ? E5_PLAN : MAS_PLAN;
  const planDates = {};
  Object.keys(planMap).forEach(function(k){ const v=planMap[k]; if (planDates[v.idx]===undefined) planDates[v.idx]=k; });

  return (
    <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",maxWidth:480,margin:"0 auto",minHeight:"100vh",background:"#f8fafc",display:"flex",flexDirection:"column"}}>
      <div style={{flex:1,overflowY:"auto",paddingBottom:68}}>

        {tab==="home" && (
          <div>
            <div style={{background:"linear-gradient(135deg,#0f172a,#1e3a5f)",padding:"24px 20px 20px",color:"#fff"}}>
              <div style={{fontSize:12,color:"#94a3b8",marginBottom:3}}>Welcome back</div>
              <div style={{fontSize:21,fontWeight:800,marginBottom:14}}>Hi, Vatsala!</div>
              <div style={{display:"flex",gap:10}}>
                <div style={{flex:1,background:"rgba(239,68,68,0.15)",borderRadius:10,padding:"10px",textAlign:"center",border:"1px solid rgba(239,68,68,0.3)"}}>
                  <div style={{fontSize:9,color:"#fca5a5",fontWeight:700,marginBottom:2}}>EXAM 5</div>
                  <div style={{fontSize:20,fontWeight:800,color:"#f87171"}}>{e5Left}d</div>
                  <div style={{fontSize:9,color:"#94a3b8"}}>Oct 27 · {e5Pct}%</div>
                </div>
                <div style={{flex:1,background:"rgba(59,130,246,0.15)",borderRadius:10,padding:"10px",textAlign:"center",border:"1px solid rgba(59,130,246,0.3)"}}>
                  <div style={{fontSize:9,color:"#93c5fd",fontWeight:700,marginBottom:2}}>MAS-I</div>
                  <div style={{fontSize:20,fontWeight:800,color:"#60a5fa"}}>{masLeft}d</div>
                  <div style={{fontSize:9,color:"#94a3b8"}}>Nov 5 · {masPct}%</div>
                </div>
              </div>
            </div>

            <div style={{padding:"14px 14px 0"}}>
              <div style={{background:"#fff",borderRadius:12,padding:14,marginBottom:12,border:"2px solid #0f172a"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:"#9ca3af",letterSpacing:"0.06em"}}>TODAY'S TASK</div>
                    <div style={{fontSize:15,fontWeight:700,color:"#0f172a",marginTop:1}}>{todayLabel}</div>
                  </div>
                  <div style={{background:isWE?"#fef9c3":"#f1f5f9",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700,color:isWE?"#854d0e":"#475569"}}>
                    {isWE?"3 hrs":"1 hr"}
                  </div>
                </div>
                {todayTask ? (
                  <div style={{background:EX[todayExam].bg,borderRadius:8,padding:"11px 12px",borderLeft:"3px solid "+EX[todayExam].color}}>
                    <div style={{fontSize:10,color:EX[todayExam].color,fontWeight:700,marginBottom:3}}>{EX[todayExam].name.toUpperCase()} · CA</div>
                    <div style={{fontSize:13,color:"#111",lineHeight:1.5,fontWeight:500}}>{todayTask.label}</div>
                  </div>
                ) : (
                  <div style={{background:"#f0fdf4",borderRadius:8,padding:"11px 12px",fontSize:13,color:"#065f46",fontWeight:500}}>
                    Rest day - no study scheduled
                  </div>
                )}
                {todayTask && (
                  <button onClick={function(){toggleSection(todayExam, todayTask.idx);}} style={{width:"100%",marginTop:10,padding:"8px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:done[todayExam].has(todayTask.idx)?"#10b981":"#0f172a",color:"#fff"}}>
                    {done[todayExam].has(todayTask.idx)?"Section complete - tap to undo":"Mark section complete"}
                  </button>
                )}
              </div>

              <div style={{background:"#fff",borderRadius:12,padding:"10px 14px",marginBottom:12,border:"1px solid #e2e8f0",fontSize:11,color:"#6b7280",lineHeight:1.6}}>
                <strong style={{color:"#3b82f6"}}>MAS-I</strong>: Mon · Wed · Fri · Sat &nbsp;|&nbsp; <strong style={{color:"#ef4444"}}>Exam 5</strong>: Tue · Thu · Sun
              </div>

              <div style={{background:"#fff",borderRadius:12,padding:14,marginBottom:12,border:"1px solid #e2e8f0"}}>
                <div style={{fontSize:10,fontWeight:700,color:"#9ca3af",letterSpacing:"0.06em",marginBottom:10}}>ADJUST PACE</div>
                {["e5","mas"].map(function(key){
                  return <div key={key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:key==="e5"?8:0}}>
                    <span style={{fontSize:12,fontWeight:600,color:EX[key].color}}>{EX[key].name}</span>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <button onClick={function(){adjust(key,-1);}} style={adjBtn}>-</button>
                      <span style={{fontSize:11,fontWeight:600,minWidth:100,textAlign:"center",color:offsets[key]===0?"#10b981":offsets[key]<0?"#ef4444":"#3b82f6"}}>
                        {offsetLabel(offsets[key])}
                      </span>
                      <button onClick={function(){adjust(key,1);}} style={adjBtn}>+</button>
                    </div>
                  </div>;
                })}
              </div>

              <div style={{background:"#fff",borderRadius:12,padding:14,marginBottom:12,border:"1px solid #e2e8f0"}}>
                <div style={{fontSize:10,fontWeight:700,color:"#9ca3af",letterSpacing:"0.06em",marginBottom:6}}>TOMORROW - {tomLabel}</div>
                {tomTask ? (
                  <div style={{fontSize:12,color:"#6b7280"}}><span style={{color:EX[tomExam].color,fontWeight:600}}>{EX[tomExam].name}: </span>{tomTask.label}</div>
                ) : (
                  <div style={{fontSize:12,color:"#9ca3af"}}>Rest day</div>
                )}
              </div>

              <div style={{background:"linear-gradient(135deg,#065f46,#0f766e)",borderRadius:12,padding:14,marginBottom:4,color:"#fff"}}>
                <div style={{fontSize:10,fontWeight:700,color:"#6ee7b7",letterSpacing:"0.06em",marginBottom:6}}>TARGETS</div>
                <div style={{fontSize:13,fontWeight:700,marginBottom:2}}>Exam 5 - October 27, 2026</div>
                <div style={{fontSize:13,fontWeight:700}}>MAS-I - November 5, 2026</div>
              </div>
            </div>
          </div>
        )}

        {tab==="plan" && (
          <div style={{padding:14}}>
            <div style={{fontSize:17,fontWeight:800,marginBottom:12,color:"#0f172a"}}>Full Plan</div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {["e5","mas"].map(function(id){
                return <button key={id} onClick={function(){setPlanExam(id);}} style={{flex:1,padding:"8px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:planExam===id?700:400,background:planExam===id?EX[id].color:"#e2e8f0",color:planExam===id?"#fff":"#64748b"}}>
                  {EX[id].name}
                </button>;
              })}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {planSections.map(function(sec,i){
                const isDone = done[planExam].has(i);
                const isLast = i===planSections.length-1;
                const dk = planDates[i];
                let dlabel = "";
                if (dk) { const p=dk.split('-').map(Number); dlabel=MN[p[1]-1]+" "+p[2]; }
                const isPractice = /ADAPT|Light review|got this/i.test(sec[0]);
                return (
                  <div key={i} onClick={function(){ if(!isLast) toggleSection(planExam,i); }} style={{background:"#fff",borderRadius:10,padding:"10px 12px",cursor:isLast?"default":"pointer",border:isLast?"2px solid #10b981":"1px solid #e2e8f0",opacity:isDone&&!isLast?0.55:1,display:"flex",alignItems:"flex-start",gap:10}}>
                    {!isLast && (
                      <div style={{width:18,height:18,borderRadius:4,flexShrink:0,marginTop:1,border:"1.5px solid "+(isDone?"#10b981":"#d1d5db"),background:isDone?"#10b981":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                        {isDone&&<span style={{color:"#fff",fontSize:11}}>✓</span>}
                      </div>
                    )}
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,color:isDone?"#9ca3af":"#111",textDecoration:isDone?"line-through":"none",lineHeight:1.4}}>{sec[0]}</div>
                      <div style={{fontSize:10,color:isPractice?"#8b5cf6":"#9ca3af",marginTop:2}}>
                        {dlabel?("from "+dlabel+" · "):(sec[1]===0?"completed · ":"")}{sec[1]} session{sec[1]===1?"":"s"}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:"1px solid #e2e8f0",display:"flex",height:60,zIndex:10}}>
        {[{id:"home",label:"Home"},{id:"plan",label:"Full Plan"}].map(function(t){
          return <button key={t.id} onClick={function(){setTab(t.id);}} style={{flex:1,background:"none",border:"none",cursor:"pointer",fontSize:13,fontWeight:tab===t.id?700:400,color:tab===t.id?"#0f172a":"#94a3b8"}}>
            {t.label}
          </button>;
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
